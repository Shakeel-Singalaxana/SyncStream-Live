<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoreboard Overlay - Premium Design</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --lt-blue: #0033cc;
            --lt-red: #cc0000;
            --lt-white: #ffffff;
            --lt-transition: cubic-bezier(0.16, 1, 0.3, 1);
            --lt-speed: 0.8s;
        }

        body {
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
            background: transparent;
        }

        .scoreboard-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 700px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .scoreboard-wrapper.visible {
            opacity: 1;
        }

        .sb-header {
            width: 100%;
            height: 60px;
            background: linear-gradient(to right, #001a66, #0033cc);
            border-radius: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
            transform: translateY(-50px);
            transition: transform var(--lt-speed) var(--lt-transition);
        }

        .sb-rows {
            width: 90%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sb-row {
            display: flex;
            align-items: center;
            height: 60px;
            transform: translateX(-50px);
            opacity: 0;
            transition: transform var(--lt-speed) var(--lt-transition), opacity var(--lt-speed) ease;
        }

        .sb-rank {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #cc0000 0%, #aa0000 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1.8rem;
            font-weight: 900;
            box-shadow: 4px 6px 10px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-right: -20px;
            z-index: 6;
        }

        .sb-main {
            flex-grow: 1;
            height: 50px;
            background: linear-gradient(135deg, #ffffff 0%, #f0f0f0 100%);
            border-radius: 0 25px 25px 0;
            padding: 0 40px 0 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 2px 6px 15px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 0, 0, 0.1);
            z-index: 5;
        }

        .sb-house-name {
            color: #111;
            font-size: 1.6rem;
            font-weight: 900;
        }

        .sb-score {
            color: #0033cc;
            font-size: 1.8rem;
            font-weight: 900;
        }

        /* House Colors */
        .house-thissa .sb-rank { background: linear-gradient(135deg, #28a745 0%, #1e7e34 100%); color: white; }
        .house-parakrama .sb-rank { background: linear-gradient(135deg, #ffd700 0%, #b8860b 100%); color: #4d3a00; }
        .house-gamunu .sb-rank { background: linear-gradient(135deg, #0033cc 0%, #001a66 100%); color: white; }
        .house-wijaya .sb-rank { background: linear-gradient(135deg, #cc0000 0%, #aa0000 100%); color: white; }

        /* Animation States */
        .scoreboard-wrapper.visible .sb-header {
            transform: translateY(0);
        }

        .scoreboard-wrapper.visible .sb-row {
            transform: translateX(0);
            opacity: 1;
        }

        .scoreboard-wrapper.animate-out {
            opacity: 0;
            transform: translate(-50%, -40%);
        }
    </style>
</head>

<body>
    <div class="scoreboard-wrapper" id="container">
        <div class="sb-header" id="event-name">SCOREBOARD</div>
        <div class="sb-rows" id="rows-container">
            <!-- Dynamic rows -->
        </div>
    </div>

    <script src="../assets/js/overlay-client.js"></script>
    <script>
        const container = document.getElementById('container');
        const rowsContainer = document.getElementById('rows-container');
        const eventNameEl = document.getElementById('event-name');

        const client = new OverlayClient('../data/scoreboard.json', (data) => {
            if (data.visible === false) {
                container.classList.add('animate-out');
                setTimeout(() => {
                    container.classList.remove('visible');
                    container.classList.remove('animate-out');
                }, 1000);
                return;
            }

            eventNameEl.textContent = data.eventName || 'SCOREBOARD';

            // Clear current
            rowsContainer.innerHTML = '';

            // Sort scores if needed (usually data should be sorted)
            const sortedScores = data.scores.sort((a, b) => a.rank - b.rank);

            // Render Rows
            sortedScores.forEach((entry, index) => {
                const row = document.createElement('div');
                const houseClass = `house-${(entry.name || '').toLowerCase()}`;
                row.className = `sb-row ${houseClass}`;
                row.style.transitionDelay = `${(index + 1) * 0.1}s`;

                row.innerHTML = `
                    <div class="sb-rank">${entry.rank}</div>
                    <div class="sb-main">
                        <div class="sb-house-name">${entry.name}</div>
                        <div class="sb-score">${entry.score}</div>
                    </div>
                `;

                rowsContainer.appendChild(row);
            });

            container.classList.add('visible');
            container.classList.remove('animate-out');
        });

        client.start();
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCMU Live Graphics - Control Center</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body class="admin-body">
    <div class="admin-container">
        <div class="header-area">
            <div>
                <h1>Control Center</h1>
                <p class="text-muted">BCMU Sports Meet 2025 Live Graphics</p>
            </div>
            <button class="btn btn-danger" onclick="logout()">Logout</button>
        </div>

        <div class="grid" id="menu-grid">
            <!-- Dynamic Content Loaded via JS -->
        </div>
    </div>

    <script>
        // Check Auth and Role on Load
        fetch('../api/check_auth.php')
            .then(response => response.json())
            .then(data => {
                if (!data.logged_in) {
                    window.location.href = 'login.html';
                } else {
                    renderMenu(data.role);
                }
            })
            .catch(() => window.location.href = 'login.html');

        function renderMenu(role) {
            const grid = document.getElementById('menu-grid');
            let html = '';

            if (role === 'organizer') {
                html += `
                    <a href="lowerthird_organizer.html" class="card">
                        <h3>Lower Thirds</h3>
                        <p>Bug Handler</p>
                    </a>
                    <a href="scoreboard_organizer.html" class="card">
                        <h3>Scoreboard</h3>
                        <p>Score Keeper</p>
                    </a>
                    <a href="marks_organizer.html" class="card">
                        <h3>Marks / Winners</h3>
                        <p>Results Entry</p>
                    </a>
                    <a href="ongoing_organizer.html" class="card">
                        <h3>Schedule</h3>
                        <p>Event Manager</p>
                    </a>
                `;
            } else {
                // Operator: One Dashboard to Rule Them All
                html += `
                    <a href="operator_dashboard.html" class="card" style="grid-column: 1 / -1; background: #222; color: #fff; border-top-color: #4caf50;">
                        <span class="icon" style="font-size: 4em;">🎛️</span>
                        <h3>OPEN LIVE DASHBOARD</h3>
                        <p>Control Lower Thirds, Scoreboard, Marks, and Schedule from one screen.</p>
                    </a>
                `;
            }
            grid.innerHTML = html;
        }

        function logout() {
            // Simple logout implementation
            document.cookie = 'PHPSESSID=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
            window.location.href = 'login.html';
        }
    </script>
</body>

</html>

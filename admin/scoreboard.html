<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoreboard Control</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            color: #000080;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .house-card {
            background: #eee;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .house-card h3 {
            margin: 0 0 10px 0;
        }

        .score-input {
            width: 60px;
            font-size: 1.5em;
            text-align: center;
            padding: 5px;
        }

        .btn-group {
            margin-top: 10px;
            display: flex;
            justify-content: center;
            gap: 5px;
        }

        .btn-adj {
            padding: 5px 10px;
            cursor: pointer;
            background: #ddd;
            border: 1px solid #ccc;
        }

        .btn-update {
            width: 100%;
            padding: 15px;
            background-color: #800000;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 18px;
            margin-top: 20px;
        }

        .btn-update:hover {
            background-color: #600000;
        }

        .nav-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #000080;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Scoreboard Control</h2>

        <div style="margin-bottom: 20px;">
            <label>Event Name:</label>
            <input type="text" id="eventName" value="SPORTS MEET 2026" style="width: 100%; padding: 8px;">
        </div>

        <div class="grid" id="houses-container">
            <!-- Houses generated by JS -->
        </div>

        <button class="btn-update" onclick="update()">Update Scoreboard</button>
        <a href="index.html" class="nav-link">Back to Dashboard</a>
    </div>

    <script>
        const houses = ['Wijaya', 'Thissa', 'Gamunu', 'Parakrama'];
        const container = document.getElementById('houses-container');

        // Init UI
        houses.forEach(house => {
            const div = document.createElement('div');
            div.className = 'house-card';
            div.innerHTML = `
                <h3>${house}</h3>
                <input type="number" id="score-${house}" class="score-input" value="0">
                <div class="btn-group">
                    <button class="btn-adj" onclick="adjust('${house}', -1)">-1</button>
                    <button class="btn-adj" onclick="adjust('${house}', 1)">+1</button>
                    <button class="btn-adj" onclick="adjust('${house}', 10)">+10</button>
                </div>
            `;
            container.appendChild(div);
        });

        function adjust(house, amount) {
            const input = document.getElementById(`score-${house}`);
            input.value = parseInt(input.value || 0) + amount;
        }

        async function update() {
            const scores = houses.map(house => ({
                name: house,
                score: parseInt(document.getElementById(`score-${house}`).value || 0)
            }));

            // Sort by score descending for rank
            scores.sort((a, b) => b.score - a.score);

            // Add rank
            scores.forEach((s, i) => s.rank = i + 1);

            const data = {
                eventName: document.getElementById('eventName').value,
                scores: scores
            };

            try {
                const response = await fetch('../api/update.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: 'scoreboard', data: data })
                });

                if (response.ok) {
                    alert('Updated Successfully');
                } else if (response.status === 401 || response.status === 403) {
                    alert('Session expired. Please login again.');
                    window.location.href = 'login.html';
                } else {
                    const errorData = await response.json();
                    alert('Update Failed: ' + (errorData.details || errorData.error || 'Unknown error'));
                    console.error('Update Error:', errorData);
                }
            } catch (e) {
                alert('Connection Error');
            }
        }

        // Check auth
        fetch('../api/check_auth.php')
            .then(res => {
                if (!res.ok) window.location.href = 'login.html';
            });
    </script>
</body>

</html>

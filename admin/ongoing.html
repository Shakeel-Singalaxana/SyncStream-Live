<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Control</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 20px;
            max-width: 600px;
            margin: auto;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            color: #000080;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 30px;
            background: #800000;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #600000;
        }

        .nav-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #000080;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Schedule Control</h2>

        <label>Current Event (Now)</label>
        <input type="text" id="current" placeholder="e.g. 4x100M Relay (Boys)">

        <label>Next Event (Upcoming)</label>
        <input type="text" id="next" placeholder="e.g. 4x100M Relay (Girls)">

        <button onclick="update()">Update Schedule</button>
        <a href="index.html" class="nav-link">Back to Dashboard</a>
    </div>

    <script>
        async function update() {
            const data = {
                current: document.getElementById('current').value,
                next: document.getElementById('next').value
            };

            const response = await fetch('../api/update.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type: 'ongoing', data: data })
            });

            if (response.ok) {
                alert('Updated!');
            } else if (response.status === 401 || response.status === 403) {
                alert('Session expired. Please login again.');
                window.location.href = 'login.html';
            } else {
                const errorData = await response.json();
                alert('Update Failed: ' + (errorData.details || errorData.error));
            }
        }
        fetch('../api/check_auth.php')
            .then(res => {
                if (!res.ok) window.location.href = 'login.html';
            });
    </script>
</body>

</html>

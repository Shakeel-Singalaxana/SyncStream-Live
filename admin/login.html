<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCMU Live Graphics - Login</title>
    <title>BCMU Live Graphics - Login</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body class="admin-body">
    <div class="admin-container" style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
        <div class="panel" style="width: 100%; max-width: 400px; text-align: center;">
            <h2>System Login</h2>
            <div class="form-group">
                <label>Select Role</label>
                <select id="role">
                    <option value="operator">Operator (Live Control)</option>
                    <option value="organizer">Bug Handler (Data Entry)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter Admin Password">
            </div>
            <button class="btn btn-primary" style="width: 100%;" onclick="login()">Access Panel</button>
            <p id="error-msg" class="error" style="color: var(--admin-danger); margin-top: 15px;"></p>
        </div>
    </div>

    <script>
        async function login() {
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const errorEl = document.getElementById('error-msg');

            try {
                const response = await fetch('../api/login.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ password: password, role: role })
                });

                const data = await response.json();

                if (data.success) {
                    window.location.href = 'index.html';
                } else {
                    errorEl.textContent = data.message || 'Invalid Password';
                }
            } catch (error) {
                errorEl.textContent = 'Connection Error';
            }
        }

        // Allow Enter key to submit
        document.getElementById('password').addEventListener('keyup', function (event) {
            if (event.key === 'Enter') {
                login();
            }
        });
    </script>
</body>

</html>

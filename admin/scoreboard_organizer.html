<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoreboard Control</title>
    <title>Scoreboard Control</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        /* Small local overrides for scoreboard specific items */
        .score-input {
            width: 80px;
            font-size: 1.5em;
            text-align: center;
            padding: 5px;
            background: #000;
            color: #fff;
            border: 1px solid var(--admin-border);
        }

        .house-card {
            background: var(--admin-panel-hover);
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid var(--admin-border);
        }
    </style>
</head>

<body class="admin-body">
    <div class="admin-container">
        <div class="header-area">
            <h1>Scoreboard Control</h1>
            <a href="index.html" class="btn btn-primary" style="text-decoration: none;">Back to Dashboard</a>
        </div>

        <div class="panel">
            <div class="form-group">
                <label>Event Name:</label>
                <input type="text" id="eventName" value="SPORTS MEET 2025">
            </div>

            <div class="grid" id="houses-container">
                <!-- Houses generated by JS -->
            </div>

            <button class="btn btn-danger" style="width: 100%; padding: 15px; font-size: 1.2em; margin-top: 20px;"
                onclick="updateLive()">Update LIVE Scoreboard</button>
        </div>
    </div>

    <script>
        const houses = ['Wijaya', 'Thissa', 'Gamunu', 'Parakrama'];
        const container = document.getElementById('houses-container');

        // Init UI
        houses.forEach(house => {
            const div = document.createElement('div');
            div.className = 'house-card';
            div.innerHTML = `
                <h3>${house}</h3>
                <input type="number" id="score-${house}" class="score-input" value="0">
                <div class="btn-group" style="margin-top: 10px; display: flex; justify-content: center; gap: 5px;">
                    <button class="btn btn-primary" style="padding: 5px 10px;" onclick="adjust('${house}', -1)">-1</button>
                    <button class="btn btn-primary" style="padding: 5px 10px;" onclick="adjust('${house}', 1)">+1</button>
                    <button class="btn btn-primary" style="padding: 5px 10px;" onclick="adjust('${house}', 10)">+10</button>
                </div>
            `;
            container.appendChild(div);
        });

        function adjust(house, amount) {
            const input = document.getElementById(`score-${house}`);
            input.value = parseInt(input.value || 0) + amount;
        }

        async function updateLive() {
            const scores = houses.map(house => ({
                name: house,
                score: parseInt(document.getElementById(`score-${house}`).value || 0)
            }));

            // Sort by score descending for rank
            scores.sort((a, b) => b.score - a.score);

            // Add rank
            scores.forEach((s, i) => s.rank = i + 1);

            const data = {
                eventName: document.getElementById('eventName').value,
                scores: scores
            };

            try {
                // Directly Update LIVE Scoreboard
                const response = await fetch('../api/update.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: 'scoreboard', data: data })
                });

                if (response.ok) {
                    alert('Scoreboard Updated LIVE!');
                } else if (response.status === 401 || response.status === 403) {
                    alert('Session expired. Please login again.');
                    window.location.href = 'login.html';
                } else {
                    alert('Update Failed');
                }
            } catch (e) {
                alert('Connection Error');
            }
        }

        // Check auth
        fetch('../api/check_auth.php')
            .then(res => {
                if (!res.ok) window.location.href = 'login.html';
            });
    </script>
</body>

</html>
